<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АСУ ТП «АгроСинтез» | Управление производством</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
        }

        /* Dashboard Layout */
        .dashboard {
            display: flex;
            height: 100vh;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 280px;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 100%);
            color: white;
            display: flex;
            flex-direction: column;
            transition: width 0.3s;
        }

        .logo-area {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            background: #2ecc71;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
        }

        .nav-menu {
            flex: 1;
            padding: 20px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 24px;
            margin: 4px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: #b0c4de;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .nav-item.active {
            background: linear-gradient(90deg, #2ecc71, transparent);
            border-left: 3px solid #2ecc71;
        }

        .user-info {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: #2ecc71;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .top-bar {
            background: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
        }

        .badge {
            background: #e74c3c;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* КАРТОЧКИ KPI */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            padding: 24px 32px;
        }

        .kpi-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }

        .kpi-card:hover { transform: translateY(-4px); }

        .kpi-title { font-size: 14px; color: #7f8c8d; margin-bottom: 8px; }
        .kpi-value { font-size: 32px; font-weight: 700; color: #2c3e50; }
        .kpi-unit { font-size: 14px; color: #95a5a6; }

        /* ТАБЛИЦЫ */
        .card-table {
            background: white;
            border-radius: 20px;
            margin: 0 32px 24px 32px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .btn-primary {
            background: #2ecc71;
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary:hover { background: #27ae60; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 12px 8px;
            border-bottom: 1px solid #ecf0f1;
        }

        th { color: #7f8c8d; font-weight: 600; font-size: 13px; }

        .status-ok {
            background: #d5f5e3;
            color: #27ae60;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }

        .status-warning {
            background: #fef9e7;
            color: #f39c12;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* МОДАЛЬНОЕ ОКНО */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 32px;
            width: 500px;
            max-width: 90%;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        /* АДАПТИВ */
        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .sidebar .nav-item span:not(.icon) { display: none; }
            .kpi-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <!-- БОКОВОЕ МЕНЮ -->
    <div class="sidebar">
        <div class="logo-area">
            <div class="logo">
                🌾 АгроСинтез
                <span>MES</span>
            </div>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" data-page="dashboard">📊 Главная</div>
            <div class="nav-item" data-page="products">🧪 Продукция</div>
            <div class="nav-item" data-page="recipes">📜 Рецептуры</div>
            <div class="nav-item" data-page="techcards">⚙️ Технологические карты</div>
            <div class="nav-item" data-page="batches">🏭 Производственные партии</div>
            <div class="nav-item" data-page="lab">🔬 Лаборатория</div>
        </div>
        <div class="user-info">
            <div class="avatar">ИТ</div>
            <div>
                <div style="font-weight: 600;">Иванов И.И.</div>
                <div style="font-size: 12px; opacity: 0.7;">Технолог</div>
            </div>
        </div>
    </div>

    <!-- ОСНОВНАЯ ОБЛАСТЬ -->
    <div class="main-content" id="mainContent">
        <!-- Динамически загружаемый контент -->
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО ДЛЯ СОЗДАНИЯ ПРОДУКТА -->
<div id="productModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-bottom: 20px;">➕ Новый продукт</h3>
        <div class="form-group">
            <label>Код продукта</label>
            <input type="text" id="prodCode" placeholder="PR-001">
        </div>
        <div class="form-group">
            <label>Наименование</label>
            <input type="text" id="prodName" placeholder="Гербицид">
        </div>
        <div class="form-group">
            <label>Тип</label>
            <select id="prodType">
                <option>Жидкость</option>
                <option>Гранулы</option>
                <option>Порошок</option>
            </select>
        </div>
        <div style="display: flex; gap: 12px; justify-content: flex-end;">
            <button onclick="closeModal()" style="background: #95a5a6; border: none; padding: 10px 20px; border-radius: 8px; color: white;">Отмена</button>
            <button onclick="addProduct()" style="background: #2ecc71; border: none; padding: 10px 20px; border-radius: 8px; color: white;">Сохранить</button>
        </div>
    </div>
</div>

<script>
    // ========== ДАННЫЕ ДЛЯ ДЕМОНСТРАЦИИ ==========
    let products = [
        { id: 1, code: "PR-001", name: "Гербицид «Торнадо»", type: "Жидкость", status: "Активен", recipe: "РЦ-001 v.2" },
        { id: 2, code: "PR-002", name: "Инсектицид «Батрадер»", type: "Гранулы", status: "Активен", recipe: "РЦ-002 v.1" },
        { id: 3, code: "PR-003", name: "Фунгицид «АгроФорт»", type: "Порошок", status: "На согласовании", recipe: "РЦ-003 v.3" }
    ];

    let batches = [
        { id: "П-101", product: "Гербицид «Торнадо»", step: "Смешивание", status: "В работе", deviation: false },
        { id: "П-102", product: "Инсектицид «Батрадер»", step: "Экструзия", status: "Контроль", deviation: true }
    ];

    let labTests = [
        { id: "Л-01", material: "Азотная кислота", status: "В работе", result: "—" },
        { id: "Л-02", material: "Гербицид П-101", status: "Завершено", result: "✅ Допущен" }
    ];

    // ========== ОТРИСОВКА СТРАНИЦ ==========
    function renderDashboard() {
        return `
            <div class="top-bar">
                <div class="page-title">🏠 Панель управления</div>
                <div><span class="badge">2 Критических события</span></div>
            </div>
            <div class="kpi-grid">
                <div class="kpi-card"><div class="kpi-title">Активные продукты</div><div class="kpi-value">${products.length}</div></div>
                <div class="kpi-card"><div class="kpi-title">Партии в работе</div><div class="kpi-value">${batches.filter(b => b.status === 'В работе').length}</div></div>
                <div class="kpi-card"><div class="kpi-title">Отклонения</div><div class="kpi-value" style="color:#e74c3c;">${batches.filter(b => b.deviation).length}</div></div>
                <div class="kpi-card"><div class="kpi-title">Ожидают лабораторию</div><div class="kpi-value">${labTests.filter(l => l.status === 'В работе').length}</div></div>
            </div>
            <div class="card-table">
                <div class="table-header"><h3>📋 Последние производственные партии</h3></div>
                <table><thead><tr><th>№ Партии</th><th>Продукт</th><th>Текущий шаг</th><th>Статус</th><th>Отклонения</th></tr></thead><tbody>
                    ${batches.map(b => `<tr><td>${b.id}</td><td>${b.product}</td><td>${b.step}</td><td><span class="${b.status === 'В работе' ? 'status-ok' : 'status-warning'}">${b.status}</span></td><td>${b.deviation ? '🔴 Критично' : '🟢 Норма'}</td></tr>`).join('')}
                </tbody></table>
            </div>
        `;
    }

    function renderProducts() {
        return `
            <div class="top-bar"><div class="page-title">🧪 Управление продукцией</div><button class="btn-primary" onclick="openModal()">+ Создать продукт</button></div>
            <div class="card-table">
                <table><thead><tr><th>Код</th><th>Наименование</th><th>Тип</th><th>Статус</th><th>Действующая рецептура</th><th>Действия</th></tr></thead><tbody>
                    ${products.map(p => `<tr><td>${p.code}</td><td>${p.name}</td><td>${p.type}</td><td><span class="status-ok">${p.status}</span></td><td>${p.recipe}</td><td>✏️ 🗑️</td></tr>`).join('')}
                </tbody></table>
            </div>
        `;
    }

    function renderLab() {
        return `
            <div class="top-bar"><div class="page-title">🔬 Лабораторный контроль</div><button class="btn-primary">+ Новое испытание</button></div>
            <div class="card-table">
                <table><thead><tr><th>ID испытания</th><th>Материал/Партия</th><th>Статус</th><th>Результат</th><th></th></tr></thead><tbody>
                    ${labTests.map(l => `<tr><td>${l.id}</td><td>${l.material}</td><td><span class="${l.status === 'Завершено' ? 'status-ok' : 'status-warning'}">${l.status}</span></td><td>${l.result}</td><td><button class="btn-primary" style="padding:6px 12px;">Ввести результат</button></td></tr>`).join('')}
                </tbody></table>
            </div>
        `;
    }

    // ========== МОДАЛЬНОЕ ОКНО ==========
    function openModal() { document.getElementById('productModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('productModal').style.display = 'none'; }

    function addProduct() {
        const code = document.getElementById('prodCode').value;
        const name = document.getElementById('prodName').value;
        const type = document.getElementById('prodType').value;
        if(code && name) {
            products.push({ id: products.length+1, code, name, type, status: "Активен", recipe: "Новая" });
            closeModal();
            document.getElementById('prodCode').value = '';
            document.getElementById('prodName').value = '';
            navigate('products');
        } else { alert("Заполните поля!"); }
    }

    // ========== НАВИГАЦИЯ ==========
    function navigate(page) {
        const container = document.getElementById('mainContent');
        if(page === 'dashboard') container.innerHTML = renderDashboard();
        else if(page === 'products') container.innerHTML = renderProducts();
        else if(page === 'lab') container.innerHTML = renderLab();
        else container.innerHTML = `<div class="top-bar"><div class="page-title">${page}</div></div><div class="card-table"><p>Раздел в разработке</p></div>`;
        
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.querySelector(`[data-page="${page}"]`).classList.add('active');
    }

    // ЗАГРУЗКА ПЕРВОЙ СТРАНИЦЫ
    navigate('dashboard');
</script>
</body>
</html>
